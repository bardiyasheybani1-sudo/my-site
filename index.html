<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👑 GOD OF GODS MODE 👑</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
  background:black;
  color:#00ffcc;
  overflow:hidden;
}

/* MATRIX BACKGROUND */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* LOGIN */
#login{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:10px;
}

input{
  padding:10px;
  border:none;
  border-radius:10px;
  outline:none;
}

button{
  padding:10px 20px;
  border:none;
  background:#00ffcc;
  cursor:pointer;
  border-radius:20px;
  transition:0.3s;
}

button:hover{transform:scale(1.1)}

/* DASHBOARD */
#dash{
  display:none;
  height:100vh;
}

/* TOP BAR */
.top{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:rgba(0,255,204,0.1);
  backdrop-filter:blur(10px);
}

/* TERMINAL */
.terminal{
  padding:20px;
  height:calc(100vh - 50px);
  overflow:auto;
  font-size:14px;
}

input.cmd{
  width:100%;
  background:black;
  color:#00ffcc;
  border:none;
  outline:none;
  margin-top:10px;
}

/* BOXES */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:10px;
  padding:20px;
}

.card{
  background:rgba(0,255,204,0.05);
  border:1px solid #00ffcc33;
  padding:15px;
  border-radius:15px;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<!-- LOGIN -->
<div id="login">
  <h1>👑 GOD OF GODS</h1>
  <input id="name" placeholder="Enter Identity">
  <button onclick="enter()">ENTER SYSTEM</button>
</div>

<!-- DASHBOARD -->
<div id="dash">

<div class="top">
  <div id="user">SYSTEM</div>
  <div>
    <button onclick="logout()">EXIT</button>
  </div>
</div>

<div class="grid">
  <div class="card">⚡ POWER: MAX</div>
  <div class="card">🧠 AI CORE: ACTIVE</div>
  <div class="card">🔥 MODE: GOD</div>
</div>

<div class="terminal" id="terminal">
> system booting...<br>
> welcome operator<br><br>

type: help
<br><br>

<input class="cmd" id="cmd" onkeydown="run(event)">
</div>

</div>

<script>

/* MATRIX */
const c = document.getElementById("matrix");
const ctx = c.getContext("2d");

c.height = window.innerHeight;
c.width = window.innerWidth;

let letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
letters = letters.split("");

let fontSize = 14;
let columns = c.width/fontSize;

let drops = [];

for(let x=0;x<columns;x++)
drops[x]=1;

function draw(){
  ctx.fillStyle="rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,c.width,c.height);

  ctx.fillStyle="#00ffcc";
  ctx.font=fontSize+"px monospace";

  for(let i=0;i<drops.length;i++){
    let text = letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text,i*fontSize,drops[i]*fontSize);

    if(drops[i]*fontSize > c.height && Math.random()>0.975)
      drops[i]=0;

    drops[i]++;
  }
}
setInterval(draw,33);

/* LOGIN */
function enter(){
  let name=document.getElementById("name").value;
  if(!name) return;

  localStorage.setItem("user",name);

  document.getElementById("login").style.display="none";
  document.getElementById("dash").style.display="block";

  document.getElementById("user").innerText="👑 "+name;
}

function logout(){
  localStorage.removeItem("user");
  location.reload();
}

/* TERMINAL */
function run(e){
  if(e.key==="Enter"){
    let cmd=document.getElementById("cmd").value;
    let t=document.getElementById("terminal");

    let out = "";

    if(cmd==="help"){
      out="commands: help / status / clear / hack";
    }
    else if(cmd==="status"){
      out="SYSTEM: ONLINE | GOD MODE ACTIVE";
    }
    else if(cmd==="hack"){
      out=">>> ACCESSING MAINFRAME... DONE 😈";
    }
    else if(cmd==="clear"){
      t.innerHTML="> cleared<br><input class='cmd' id='cmd' onkeydown='run(event)'>";
      return;
    }
    else{
      out="unknown command";
    }

    t.innerHTML += "<br>> "+cmd+"<br>"+out+"<br>";
    t.scrollTop=t.scrollHeight;

    document.getElementById("cmd").value="";
  }
}

/* AUTO LOGIN */
window.onload=()=>{
  let u=localStorage.getItem("user");
  if(u){
    document.getElementById("login").style.display="none";
    document.getElementById("dash").style.display="block";
    document.getElementById("user").innerText="👑 "+u;
  }
}

</script>

</body>
</html>
