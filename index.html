<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌐 METAVERSE CORE</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  font-family:Arial;
}

#ui{
  position:fixed;
  top:10px;
  left:10px;
  color:#00ffcc;
  z-index:10;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#00ffcc;
}

#panel{
  position:fixed;
  bottom:10px;
  left:10px;
  color:white;
  z-index:10;
  background:rgba(0,0,0,0.5);
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div id="ui">
  🌐 METAVERSE CORE<br>
  <button onclick="move('up')">⬆️</button><br>
  <button onclick="move('left')">⬅️</button>
  <button onclick="move('down')">⬇️</button>
  <button onclick="move('right')">➡️</button>
</div>

<div id="panel">
  🧠 وضعیت: ورود به جهان مجازی<br>
  ⚡ حرکت: دکمه‌ها
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

// SCENE
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000, 5, 50);

// CAMERA
const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth/window.innerHeight,
  0.1,
  1000
);

camera.position.z = 10;

// RENDERER
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
const light = new THREE.PointLight(0x00ffcc, 2);
light.position.set(5,5,5);
scene.add(light);

// PLAYER (YOU)
const geometry = new THREE.SphereGeometry(1,32,32);
const material = new THREE.MeshStandardMaterial({color:0x00ffcc});
const player = new THREE.Mesh(geometry, material);
scene.add(player);

// PLANETS
let planets=[];
for(let i=0;i<20;i++){
  let p = new THREE.Mesh(
    new THREE.SphereGeometry(Math.random()*0.5+0.2,16,16),
    new THREE.MeshStandardMaterial({color:0xffffff*Math.random()})
  );
  p.position.set(
    (Math.random()-0.5)*30,
    (Math.random()-0.5)*30,
    (Math.random()-0.5)*30
  );
  scene.add(p);
  planets.push(p);
}

// MOVEMENT
function move(dir){
  if(dir==="up") player.position.y += 1;
  if(dir==="down") player.position.y -= 1;
  if(dir==="left") player.position.x -= 1;
  if(dir==="right") player.position.x += 1;
}

// ANIMATE
function animate(){
  requestAnimationFrame(animate);

  player.rotation.y += 0.01;

  planets.forEach(p=>{
    p.rotation.x += 0.005;
    p.rotation.y += 0.005;
  });

  camera.position.x += (player.position.x - camera.position.x)*0.05;
  camera.position.y += (player.position.y - camera.position.y)*0.05;
  camera.lookAt(player.position);

  renderer.render(scene, camera);
}
animate();

// RESIZE
window.addEventListener("resize",()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
    </html>
