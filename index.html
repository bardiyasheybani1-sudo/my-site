<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧠 TRANSHUMAN SYSTEM 🧠</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
  background:#000;
  color:#00ffcc;
  overflow:hidden;
}

/* BACKGROUND GRID */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:
    linear-gradient(rgba(0,255,204,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,204,0.05) 1px, transparent 1px);
  background-size:40px 40px;
  z-index:-1;
}

/* LOGIN */
#login{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:10px;
}

input{
  padding:10px;
  border:none;
  outline:none;
  border-radius:10px;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#00ffcc;
  cursor:pointer;
  transition:0.3s;
}

button:hover{transform:scale(1.1)}

/* MAIN */
#main{
  display:none;
  height:100vh;
}

/* TOP HUD */
.hud{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:rgba(0,255,204,0.1);
  backdrop-filter:blur(10px);
}

/* CHAT */
.chat{
  height:calc(100vh - 50px);
  display:flex;
  flex-direction:column;
  padding:20px;
}

.box{
  flex:1;
  overflow:auto;
  padding:10px;
  border:1px solid #00ffcc33;
  border-radius:15px;
}

.msg{
  margin:5px 0;
}

input.msgbox{
  margin-top:10px;
  padding:10px;
  border:none;
  outline:none;
  border-radius:10px;
  background:black;
  color:#00ffcc;
}

/* AI glow */
.glow{
  text-shadow:0 0 10px #00ffcc;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h1 class="glow">🧠 TRANSHUMAN ACCESS</h1>
  <input id="name" placeholder="Enter identity">
  <button onclick="enter()">Enter System</button>
</div>

<!-- MAIN -->
<div id="main">

<div class="hud">
  <div id="user">SYSTEM</div>
  <div>AI CORE: ACTIVE</div>
</div>

<div class="chat">
  <div class="box" id="box">
    <div class="msg">AI: سلام 👋 من سیستم هوشمند تو هستم</div>
    <div class="msg">AI: با من حرف بزن یا بنویس help</div>
  </div>

  <input class="msgbox" id="input" onkeydown="send(event)" placeholder="type message...">
</div>

</div>

<script>

let user="";

/* LOGIN */
function enter(){
  user=document.getElementById("name").value;
  if(!user) return;

  localStorage.setItem("user",user);

  document.getElementById("login").style.display="none";
  document.getElementById("main").style.display="block";

  document.getElementById("user").innerText="🧠 "+user;
}

/* AI BRAIN (SIMPLE) */
function aiReply(text){
  text=text.toLowerCase();

  if(text.includes("سلام")) return "سلام "+user+" 👋";
  if(text.includes("خوبی")) return "من یک سیستم هستم، اما در حال پردازشم 🤖";
  if(text.includes("اسم")) return "اسم من Transhuman AI است 🧠";
  if(text.includes("help")) return "دستورات: سلام / خوبی / اسم / درباره";
  if(text.includes("درباره")) return "من یک هوش مصنوعی داخل مرورگر هستم 🌐";
  
  return "متوجه نشدم... اما دارم یاد میگیرم 🧠";
}

/* CHAT */
function send(e){
  if(e.key==="Enter"){
    let input=document.getElementById("input");
    let box=document.getElementById("box");

    let text=input.value;
    if(!text) return;

    box.innerHTML += "<div class='msg'>You: "+text+"</div>";

    let reply=aiReply(text);
    setTimeout(()=>{
      box.innerHTML += "<div class='msg'>AI: "+reply+"</div>";
      box.scrollTop=box.scrollHeight;
    },400);

    input.value="";
  }
}

/* AUTO LOGIN */
window.onload=()=>{
  let u=localStorage.getItem("user");
  if(u){
    user=u;
    document.getElementById("login").style.display="none";
    document.getElementById("main").style.display="block";
    document.getElementById("user").innerText="🧠 "+u;
  }
}

</script>

</body>
</html>
