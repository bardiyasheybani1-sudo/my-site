<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bardiya Sheybani</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Orbitron',sans-serif;
background:#050816;
overflow-x:hidden;
color:white;
}

/* پس زمینه متحرک */

.stars{
position:fixed;
width:100%;
height:100%;
background:url('https://i.imgur.com/YKY28eT.png');
animation:moveStars 120s linear infinite;
z-index:-2;
}

@keyframes moveStars{
from{
transform:translateY(0);
}
to{
transform:translateY(-2000px);
}
}

/* نور */

.glow{
position:fixed;
width:500px;
height:500px;
background:radial-gradient(circle,#00ffff55,transparent);
top:-100px;
left:-100px;
filter:blur(80px);
z-index:-1;
animation:moveGlow 10s infinite alternate;
}

@keyframes moveGlow{
100%{
transform:translate(700px,400px);
}
}

/* هدر */

header{
padding:30px;
display:flex;
justify-content:space-between;
align-items:center;
backdrop-filter:blur(10px);
background:#ffffff10;
border-bottom:1px solid #ffffff20;
position:sticky;
top:0;
z-index:100;
}

.logo{
font-size:30px;
font-weight:bold;
color:#00ffff;
text-shadow:0 0 20px #00ffff;
}

nav a{
margin:0 15px;
text-decoration:none;
color:white;
transition:0.3s;
}

nav a:hover{
color:#00ffff;
text-shadow:0 0 15px #00ffff;
}

/* بخش اصلی */

.hero{
height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero h1{
font-size:70px;
color:#00ffff;
text-shadow:0 0 25px #00ffff;
animation:float 3s ease-in-out infinite;
}

.hero p{
margin-top:20px;
font-size:22px;
color:#cccccc;
max-width:700px;
}

@keyframes float{
0%,100%{
transform:translateY(0);
}
50%{
transform:translateY(-15px);
}
}

/* دکمه */

.btn{
margin-top:40px;
padding:18px 40px;
border:none;
border-radius:50px;
font-size:20px;
cursor:pointer;
background:linear-gradient(45deg,#00ffff,#0066ff);
color:white;
box-shadow:0 0 25px #00ffff;
transition:0.4s;
}

.btn:hover{
transform:scale(1.1);
box-shadow:0 0 40px #00ffff;
}

/* کارت ها */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
padding:60px;
}

.card{
background:#ffffff10;
border:1px solid #ffffff20;
backdrop-filter:blur(12px);
padding:30px;
border-radius:25px;
transition:0.4s;
}

.card:hover{
transform:translateY(-10px) scale(1.03);
box-shadow:0 0 30px #00ffff55;
}

.card h2{
color:#00ffff;
margin-bottom:15px;
}

/* فوتر */

footer{
text-align:center;
padding:30px;
color:#888;
}

</style>
</head>

<body>

<div class="stars"></div>
<div class="glow"></div>

<header>
<div class="logo">BARDIYA</div>

<nav>
<a href="#">Home</a>
<a href="#">Skills</a>
<a href="#">Projects</a>
<a href="#">Contact</a>
</nav>
</header>

<section class="hero">

<h1>WELCOME</h1>

<p>
Official futuristic website of Bardiya Sheybani
</p>

<button class="btn">ENTER THE FUTURE</button>

</section>

<section class="cards">

<div class="card">
<h2>⚽ Football</h2>
<p>Barcelona • Liverpool • PSG</p>
</div>

<div class="card">
<h2>🎸 Music</h2>
<p>Classical Guitar & Rock Music</p>
</div>

<div class="card">
<h2>🧠 Math</h2>
<p>Olympiads • Kangaroo • Advanced Math</p>
</div>

</section>

<footer>
© 2026 Bardiya Sheybani
</footer>

</body>
</html>
