
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>My Personal Site</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
      overflow: hidden;
    }

    /* 🌈 پس‌زمینه متحرک */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, #0f172a, #1e3a8a, #9333ea, #06b6d4);
      background-size: 400% 400%;
      animation: moveBG 10s ease infinite;
      z-index: -3;
    }

    @keyframes moveBG {
      0% { transform: translate(0,0); }
      50% { transform: translate(-25%, -25%); }
      100% { transform: translate(0,0); }
    }

    .container {
      padding: 60px 20px;
    }

    /* ✨ انیمیشن اسم */
    .typewriter {
      font-size: 40px;
      margin-bottom: 10px;
      white-space: nowrap;
      overflow: hidden;
      border-right: 3px solid white;
      width: 0;
      animation: typing 3s steps(30, end) forwards, blink 0.7s infinite;
    }

    @keyframes typing {
      from { width: 0; }
      to { width: 100%; }
    }

    @keyframes blink {
      50% { border-color: transparent; }
    }

    p {
      font-size: 20px;
      opacity: 0.9;
    }

    .card {
      margin-top: 30px;
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 15px;
      display: inline-block;
      backdrop-filter: blur(8px);
    }

    .medals {
      margin-top: 10px;
      font-size: 18px;
      line-height: 1.8;
    }

    /* ⭐ ستاره‌ها */
    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: -2;
    }

    .star {
      position: absolute;
      width: 3px;
      height: 3px;
      background: white;
      border-radius: 50%;
      animation: floatStar linear infinite;
      opacity: 0.8;
    }

    @keyframes floatStar {
      from { transform: translateY(100vh); }
      to { transform: translateY(-10vh); }
    }

    /* 🎵 دکمه موزیک */
    #musicBtn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 12px 18px;
      border: none;
      border-radius: 12px;
      background: #1e3a8a;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <!-- ⭐ ستاره‌ها -->
  <div class="stars"></div>

  <!-- 🎵 موزیک -->
  <audio id="bgmusic" loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <button onclick="toggleMusic()" id="musicBtn">▶ Play Music</button>

  <div class="container">

    <h1 class="typewriter">سلام، من بردیا شیبانی هستم 👋</h1>
    <p>به سایت شخصی من خوش آمدید 🚀</p>

    <div class="card">
      <h2>🏅 مدال‌ها و افتخارات</h2>
      <div class="medals">
        🥇 شاگرد اول در درس‌ها<br>
        🧠 مهارت بالا در ریاضی<br>
        🌍 مهارت در زبان انگلیسی<br>
        ⚽ علاقه‌مند به فوتبال و ورزش<br>
        🎸 نوازنده گیتار کلاسیک (۴ سال تجربه)<br>
        🏆 شرکت در المپیاد آسیایی
      </div>
    </div>

  </div>

  <script>
    /* ⭐ ستاره‌ها */
    function createStars() {
      const starsContainer = document.querySelector('.stars');

      for (let i = 0; i < 80; i++) {
        let star = document.createElement('div');
        star.classList.add('star');

        star.style.left = Math.random() * 100 + 'vw';
        star.style.top = Math.random() * 100 + 'vh';

        let size = Math.random() * 3;
        star.style.width = size + 'px';
        star.style.height = size + 'px';

        star.style.animationDuration = (5 + Math.random() * 10) + 's';

        starsContainer.appendChild(star);
      }
    }

    createStars();

    /* 🎵 موزیک */
    let isPlaying = false;
    const music = document.getElementById("bgmusic");
    const btn = document.getElementById("musicBtn");

    function toggleMusic() {
      if (isPlaying) {
        music.pause();
        btn.innerHTML = "▶ Play Music";
      } else {
        music.play();
        btn.innerHTML = "⏸ Pause Music";
      }
      isPlaying = !isPlaying;
    }
  </script>

</body>
</html>
