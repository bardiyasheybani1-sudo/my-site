<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧬 REALITY ENGINE</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
  background:black;
  color:#00ffcc;
  overflow:hidden;
}

/* HOLOGRAM GRID */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:
    radial-gradient(circle, rgba(0,255,204,0.08) 1px, transparent 1px);
  background-size:30px 30px;
  animation:move 8s linear infinite;
  z-index:-1;
}

@keyframes move{
  from{transform:translateY(0)}
  to{transform:translateY(-200px)}
}

/* LOGIN */
#login{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:10px;
}

input{
  padding:10px;
  border:none;
  border-radius:10px;
  outline:none;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#00ffcc;
  cursor:pointer;
  transition:0.3s;
}

button:hover{transform:scale(1.1)}

/* MAIN */
#main{
  display:none;
  height:100vh;
}

/* HUD */
.hud{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:rgba(0,255,204,0.1);
  backdrop-filter:blur(10px);
}

/* WORLD */
.world{
  height:calc(100vh - 50px);
  display:flex;
  flex-direction:column;
  padding:20px;
}

/* OUTPUT */
.box{
  flex:1;
  overflow:auto;
  border:1px solid #00ffcc33;
  border-radius:15px;
  padding:10px;
}

/* INPUT */
input.msg{
  margin-top:10px;
  padding:10px;
  border:none;
  outline:none;
  border-radius:10px;
  background:black;
  color:#00ffcc;
}

/* GLOW */
.glow{
  text-shadow:0 0 15px #00ffcc;
}
</style>
</head>

<body>

<div id="login">
  <h1 class="glow">🧬 ENTER REALITY ENGINE</h1>
  <input id="name" placeholder="identity">
  <button onclick="enter()">Initialize</button>
</div>

<div id="main">

<div class="hud">
  <div id="user">UNKNOWN</div>
  <div>REALITY STATUS: STABLE</div>
</div>

<div class="world">

<div class="box" id="box">
  <div>🧠 SYSTEM: Reality Engine Activated</div>
  <div>🌌 Type commands or talk naturally</div>
</div>

<input class="msg" id="input" onkeydown="run(event)" placeholder="speak / command...">

</div>

</div>

<script>

let user="";

/* SAVE MEMORY */
let memory = JSON.parse(localStorage.getItem("mem") || "[]");

function saveMemory(){
  localStorage.setItem("mem", JSON.stringify(memory));
}

/* ENTER */
function enter(){
  user=document.getElementById("name").value;
  if(!user) return;

  localStorage.setItem("user",user);

  document.getElementById("login").style.display="none";
  document.getElementById("main").style.display="block";

  document.getElementById("user").innerText="🧬 "+user;

  loadMemory();
}

/* LOAD MEMORY */
function loadMemory(){
  let box=document.getElementById("box");
  memory.forEach(m=>{
    box.innerHTML += "<div>🧠 MEM: "+m+"</div>";
  });
}

/* AI CORE */
function ai(text){
  text=text.toLowerCase();

  if(text.includes("سلام")) return "سلام "+user+" 👋";
  if(text.includes("کی هستی")) return "من Reality Engine هستم 🧬";
  if(text.includes("چی هست")) return "من مرز بین واقعیت و کد هستم 🌌";
  if(text.includes("help")) return "commands: save / clear / memory / reality";

  return "پردازش... این جمله وارد لایه واقعیت شد 🧠";
}

/* RUN SYSTEM */
function run(e){
  if(e.key==="Enter"){
    let input=document.getElementById("input");
    let box=document.getElementById("box");

    let text=input.value;
    if(!text) return;

    box.innerHTML += "<div>👤 YOU: "+text+"</div>";

    memory.push(text);
    saveMemory();

    if(text==="clear"){
      box.innerHTML="";
      input.value="";
      return;
    }

    let reply = ai(text);

    setTimeout(()=>{
      box.innerHTML += "<div>🧬 AI: "+reply+"</div>";
      box.scrollTop=box.scrollHeight;
    },300);

    input.value="";
  }
}

/* AUTO LOGIN */
window.onload=()=>{
  let u=localStorage.getItem("user");
  if(u){
    user=u;
    document.getElementById("login").style.display="none";
    document.getElementById("main").style.display="block";
    document.getElementById("user").innerText="🧬 "+u;
    loadMemory();
  }
}

</script>

</body>
</html>
