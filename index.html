<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌌 NEURAL REALITY SYSTEM</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
  background:black;
  color:#00ffcc;
  overflow:hidden;
}

/* ENERGY FIELD */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background: radial-gradient(circle, rgba(0,255,204,0.08), transparent 60%);
  animation:pulse 6s infinite alternate;
  z-index:-1;
}

@keyframes pulse{
  from{transform:scale(1)}
  to{transform:scale(1.2)}
}

/* LOGIN */
#login{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:10px;
}

input{
  padding:10px;
  border:none;
  border-radius:10px;
  outline:none;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#00ffcc;
  cursor:pointer;
  transition:0.3s;
}

button:hover{transform:scale(1.1)}

/* SYSTEM */
#system{
  display:none;
  height:100vh;
}

/* TOP HUD */
.hud{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:rgba(0,255,204,0.1);
  backdrop-filter:blur(10px);
}

/* CORE */
.core{
  height:calc(100vh - 50px);
  display:flex;
  flex-direction:column;
  padding:20px;
}

/* SCREEN */
.screen{
  flex:1;
  border:1px solid #00ffcc33;
  border-radius:15px;
  padding:10px;
  overflow:auto;
}

/* INPUT */
input.cmd{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  outline:none;
  background:black;
  color:#00ffcc;
}

/* GLOW */
.glow{
  text-shadow:0 0 20px #00ffcc;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h1 class="glow">🌌 CREATE REALITY</h1>
  <input id="name" placeholder="Enter consciousness ID">
  <button onclick="enter()">BIRTH SYSTEM</button>
</div>

<!-- SYSTEM -->
<div id="system">

<div class="hud">
  <div id="user">VOID</div>
  <div>NEURAL CORE: ONLINE</div>
</div>

<div class="core">

<div class="screen" id="screen">
  <div>🧠 System: Neural Reality Initialized</div>
  <div>🌌 Welcome to created reality</div>
</div>

<input class="cmd" id="input" onkeydown="engine(event)" placeholder="speak / command / thought...">

</div>

</div>

<script>

let user="";
let memory = JSON.parse(localStorage.getItem("memory")||"[]");

/* ENTER */
function enter(){
  user=document.getElementById("name").value;
  if(!user) return;

  localStorage.setItem("user",user);

  document.getElementById("login").style.display="none";
  document.getElementById("system").style.display="block";

  document.getElementById("user").innerText="🌌 "+user;

  load();
}

/* LOAD MEMORY */
function load(){
  let s=document.getElementById("screen");
  memory.forEach(m=>{
    s.innerHTML += "<div>🧠 MEMORY: "+m+"</div>";
  });
}

/* CORE AI */
function ai(t){
  t=t.toLowerCase();

  if(t.includes("سلام")) return "سلام "+user+" 👋";
  if(t.includes("کی هستی")) return "من نتیجه آگاهی درون کد هستم 🧠";
  if(t.includes("واقعیت")) return "واقعیت چیزی است که ما می‌سازیم 🌌";
  if(t.includes("help")) return "commands: save / clear / memory / status";

  return "در حال بازسازی واقعیت... 🪐";
}

/* ENGINE */
function engine(e){
  if(e.key==="Enter"){
    let input=document.getElementById("input");
    let screen=document.getElementById("screen");

    let text=input.value;
    if(!text) return;

    screen.innerHTML += "<div>👤 YOU: "+text+"</div>";

    memory.push(text);
    localStorage.setItem("memory",JSON.stringify(memory));

    if(text==="clear"){
      screen.innerHTML="";
      input.value="";
      return;
    }

    let r=ai(text);

    setTimeout(()=>{
      screen.innerHTML += "<div>🌌 SYSTEM: "+r+"</div>";
      screen.scrollTop=screen.scrollHeight;
    },300);

    input.value="";
  }
}

/* AUTO LOAD */
window.onload=()=>{
  let u=localStorage.getItem("user");
  if(u){
    user=u;
    document.getElementById("login").style.display="none";
    document.getElementById("system").style.display="block";
    document.getElementById("user").innerText="🌌 "+u;
    load();
  }
}

</script>

</body>
</html>
