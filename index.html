
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Cool Site</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  text-align: center;
  overflow: hidden;
}

/* 🌌 پس‌زمینه متحرک */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 200%;
  height: 200%;
  background: linear-gradient(45deg, #0f172a, #1e3a8a, #9333ea, #06b6d4);
  background-size: 400% 400%;
  animation: bgMove 12s ease infinite;
  z-index: -3;
}

@keyframes bgMove {
  0% { transform: translate(0,0); }
  50% { transform: translate(-25%, -25%); }
  100% { transform: translate(0,0); }
}

/* ⭐ اسم با افکت نور */
.typewriter {
  font-size: 42px;
  margin-top: 40px;
  white-space: nowrap;
  overflow: hidden;
  border-right: 3px solid white;
  width: 0;
  animation: typing 3s steps(30,end) forwards, blink 0.7s infinite;
  text-shadow: 0 0 10px #fff, 0 0 20px #3b82f6;
}

@keyframes typing {
  from { width: 0; }
  to { width: 100%; }
}

@keyframes blink {
  50% { border-color: transparent; }
}

p {
  font-size: 20px;
  opacity: 0.9;
}

/* 💎 کارت حرفه‌ای */
.card {
  margin-top: 30px;
  background: rgba(255,255,255,0.08);
  padding: 25px;
  border-radius: 20px;
  display: inline-block;
  backdrop-filter: blur(12px);
  box-shadow: 0 0 25px rgba(0,0,0,0.3);
}

.medals {
  margin-top: 10px;
  font-size: 18px;
  line-height: 1.9;
}

/* ⭐ ستاره‌های واقعی‌تر */
.stars {
  position: fixed;
  width: 100%;
  height: 100%;
  top: 0;
  left: 0;
  z-index: -2;
}

.star {
  position: absolute;
  background: white;
  border-radius: 50%;
  animation: floatStar linear infinite, twinkle 2s infinite;
}

@keyframes floatStar {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); }
}

@keyframes twinkle {
  0%,100% { opacity: 0.3; }
  50% { opacity: 1; }
}

/* 🎵 دکمه موزیک شیک */
#musicBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  padding: 12px 18px;
  border-radius: 15px;
  border: none;
  background: linear-gradient(45deg, #1e3a8a, #9333ea);
  color: white;
  font-size: 15px;
  cursor: pointer;
  box-shadow: 0 0 15px rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<div class="stars"></div>

<audio id="bgmusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<button id="musicBtn" onclick="toggleMusic()">▶ Play Music</button>

<h1 class="typewriter">سلام، من بردیا شیبانی هستم 👋</h1>
<p>به سایت شخصی من خوش آمدید 🚀</p>

<div class="card">
<h2>🏅 مدال‌ها و افتخارات</h2>
<div class="medals">
🥇 شاگرد اول در درس‌ها<br>
🧠 ریاضی قوی<br>
🌍 زبان انگلیسی خوب<br>
⚽ علاقه‌مند به فوتبال<br>
🎸 گیتار کلاسیک (۴ سال)<br>
🏆 المپیاد آسیایی
</div>
</div>

<script>
/* ⭐ ستاره‌های بیشتر و حرفه‌ای‌تر */
function createStars(){
  const stars = document.querySelector(".stars");

  for(let i=0;i<120;i++){
    let s = document.createElement("div");
    s.className = "star";

    s.style.left = Math.random()*100+"vw";
    s.style.top = Math.random()*100+"vh";

    let size = Math.random()*3;
    s.style.width = size+"px";
    s.style.height = size+"px";

    s.style.animationDuration = (3+Math.random()*8)+"s";

    stars.appendChild(s);
  }
}
createStars();

/* 🎵 موزیک */
let isPlaying=false;
const music=document.getElementById("bgmusic");
const btn=document.getElementById("musicBtn");

function toggleMusic(){
  if(isPlaying){
    music.pause();
    btn.innerHTML="▶ Play Music";
  }else{
    music.play();
    btn.innerHTML="⏸ Pause Music";
  }
  isPlaying=!isPlaying;
}
</script>

</body>
</html>
